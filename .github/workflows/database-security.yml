name: Database Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  database-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npx supabase start
      - run: node scripts/seed-dev.mjs
      - run: node scripts/verify-public-access.mjs
      - run: node scripts/verify-audit-authenticity.mjs
      - run: node scripts/verify-ops.mjs
      - run: node scripts/verify-ops-capture.mjs
